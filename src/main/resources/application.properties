spring.application.name=mutation-ai-studio
server.port=8081

spring.main.banner-mode=off
spring.main.log-startup-info=false
logging.level.root=ERROR

server.error.include-message=always
server.error.include-stacktrace=never

spring.autoconfigure.exclude=\
  org.springframework.boot.autoconfigure.jdbc.DataSourceAutoConfiguration,\
  org.springframework.boot.autoconfigure.orm.jpa.HibernateJpaAutoConfiguration,\
  org.springframework.boot.autoconfigure.data.jpa.JpaRepositoriesAutoConfiguration

spring.ai.ollama.base-url=${MUTATION_AI_OLLAMA_BASE_URL:http://localhost:11434}
spring.ai.ollama.chat.model=${MUTATION_AI_OLLAMA_MODEL:qwen2.5-coder:7b}
spring.ai.ollama.chat.options.temperature=0.1
spring.ai.ollama.chat.options.top-p=0.9
spring.ai.ollama.chat.options.num-predict=2048

workspace.projects.storage-path=${WORKSPACE_PROJECTS_STORAGE_PATH:data/projects/projects.json}
workspace.pit-runner.base-url=${WORKSPACE_PIT_RUNNER_BASE_URL:http://127.0.0.1:17845}
workspace.pit-runner.timeout-minutes=${WORKSPACE_PIT_RUNNER_TIMEOUT_MINUTES:25}
